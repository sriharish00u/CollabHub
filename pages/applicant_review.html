<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Applicant Review | CollabHub</title>
<link rel="stylesheet" href="/assets/css/styles.css"/>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen">
<main class="max-w-[1200px] mx-auto pt-8 px-gutter pb-xxl">
<!-- Header -->
<header class="mb-lg flex flex-col md:flex-row md:items-end justify-between gap-md">
<div class="flex flex-col gap-xs">
<a class="flex items-center gap-xs text-primary font-label text-label hover:underline" href="activity_detail.html">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    Back to Activity Detail
                </a>
<div class="flex items-baseline gap-md mt-sm">
<h1 class="font-h2 text-h2 text-on-surface">Applicant Review</h1>
<span id="activity-title" class="font-h5 text-h5 text-outline-variant"></span>
</div>
<p id="applicant-count" class="font-body-md text-on-surface-variant"></p>
</div>
</header>
<!-- Filters & Sort -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md mb-lg flex flex-wrap items-center justify-between gap-md">
<div class="flex flex-wrap items-center gap-md">
<div class="flex flex-col gap-1">
<label class="font-label text-[10px] text-outline uppercase tracking-wider">Sort by</label>
<select id="sort-select" class="bg-transparent border-none font-label text-label text-primary focus:ring-0 p-0 cursor-pointer">
<option value="match">Best Match (Default)</option>
<option value="newest">Newest First</option>
<option value="skill">Highest Skill Level</option>
</select>
</div>
<div class="h-8 w-px bg-outline-variant hidden sm:block"></div>
<div class="flex flex-col gap-1">
<label class="font-label text-[10px] text-outline uppercase tracking-wider">Status</label>
<div class="flex gap-xs">
<button class="filter-btn px-md py-1 rounded-full bg-primary text-white font-label text-label" data-filter="all">All</button>
<button class="filter-btn px-md py-1 rounded-full bg-surface-container-high text-on-surface-variant font-label text-label hover:bg-surface-variant" data-filter="Pending">Pending</button>
<button class="filter-btn px-md py-1 rounded-full bg-surface-container-high text-on-surface-variant font-label text-label hover:bg-surface-variant" data-filter="Approved">Approved</button>
</div>
</div>
</div>
<div class="relative w-full md:w-auto">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">person_search</span>
<input id="search-input" class="w-full md:w-64 pl-10 pr-md py-2 bg-surface border border-outline-variant rounded-lg text-body-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none" placeholder="Search by name..." type="text"/>
</div>
</section>
<!-- Applicant List -->
<div class="flex flex-col gap-md" id="applicant-list"></div>
<!-- Empty State (Hidden by default) -->
<section class="hidden py-xxl flex flex-col items-center justify-center text-center" id="empty-state">
<div class="w-24 h-24 mb-lg text-outline-variant opacity-50">
<span class="material-symbols-outlined text-[96px]">person_off</span>
</div>
<h2 class="font-h3 text-h3 text-on-surface-variant">No applicants found</h2>
<p class="font-body-md text-outline mt-sm max-w-md">Try adjusting your filters or search terms to find candidates.</p>
<button class="mt-lg px-xl py-2.5 border border-primary text-primary rounded-lg font-label text-label hover:bg-primary-container/10 transition-colors" id="reset-btn">
                Clear all filters
            </button>
</section>
</main>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/components/sidebar.js"></script>
<script src="/assets/js/pages/applicant_review.js"></script>
</body></html>
