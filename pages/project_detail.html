<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Project Details</title>
<link rel="stylesheet" href="/assets/css/styles.css"/>
<style>
        .skill-pill {
            transition: all 0.2s ease;
        }
        .skill-pill:hover {
            box-shadow: 0 4px 12px rgba(67, 56, 202, 0.08);
        }
        .match-ring {
            background: conic-gradient(#F97316 98%, #E2E8F0 0);
        }
        .custom-scroll-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-background pb-32">
<main class="pt-8 px-md py-lg space-y-lg">
<!-- Hero Section -->
<section class="relative overflow-hidden bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col items-center text-center space-y-md">
<div class="absolute top-0 right-0 p-4">
<div class="relative w-20 h-20 flex items-center justify-center rounded-full match-ring">
<div class="w-16 h-16 bg-surface-container-lowest rounded-full flex items-center justify-center">
<span class="font-h5 text-h5 text-secondary" id="match-score">--</span>
</div>
</div>
</div>
<div class="w-full flex flex-col items-center pt-8">
<span class="font-label text-label uppercase tracking-wider text-secondary mb-2" id="activity-category"></span>
<h2 class="font-h1-mobile text-h1-mobile text-on-surface max-w-xs" id="activity-title"></h2>
<div class="mt-4 flex -space-x-2" id="members-avatars"></div>
<p class="font-caption text-caption text-outline mt-2" id="members-location"></p>
</div>
</section>
<!-- About Project -->
<section class="space-y-md">
<h3 class="font-h4 text-h4 text-on-surface">About Project</h3>
<div class="bg-surface border border-outline-variant rounded-lg p-md">
<p class="font-body-md text-body-md text-on-surface-variant" id="activity-description"></p>
</div>
</section>
<!-- Skills Required -->
<section class="space-y-md">
<h3 class="font-h4 text-h4 text-on-surface">Skills Required</h3>
<div class="flex flex-wrap gap-sm" id="skills-list"></div>
</section>
<!-- Team Members -->
<section class="space-y-md">
<h3 class="font-h4 text-h4 text-on-surface">Team</h3>
<div class="space-y-sm" id="team-list"></div>
</section>
<!-- Fixed CTA Action -->
<div class="fixed bottom-24 left-0 w-full px-md z-40">
<div class="flex gap-md w-full">
<button class="flex-1 bg-primary text-white h-14 rounded-lg font-h5 flex items-center justify-center active:scale-95 transition-transform shadow-md" id="apply-btn">
                    Apply Now
                </button>
<button class="w-14 h-14 border-2 border-primary text-primary rounded-lg flex items-center justify-center active:scale-95 transition-transform bg-surface">
<span class="material-symbols-outlined">bookmark</span>
</button>
</div>
</div>
</main>
<!-- Status toast -->
<div id="toast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-50 px-lg py-md rounded-lg shadow-lg font-label text-label text-on-primary transition-all duration-300"></div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/components/sidebar.js"></script>
<script src="/assets/js/pages/project_detail.js"></script>
</body></html>
