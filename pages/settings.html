<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Settings - CollabHub</title>
<link rel="stylesheet" href="/assets/css/styles.css"/>
</head>
<body class="antialiased pb-24">
<main class="pt-8 px-md space-y-lg max-w-md mx-auto">
<!-- Profile Header Section -->
<section class="bg-white border border-[#E2E8F0] rounded-xl p-lg shadow-sm">
<div class="flex flex-col items-center text-center">
<div class="relative w-24 h-24 mb-md">
<img class="w-24 h-24 rounded-full border-4 border-primary-fixed object-cover" id="profile-avatar-settings" src="" alt="Profile"/>
<div class="absolute bottom-0 right-0 bg-primary text-white p-1.5 rounded-full border-2 border-white">
<span class="material-symbols-outlined text-[16px]">edit</span>
</div>
</div>
<h2 class="font-h4 text-h4 text-on-background" id="settings-name"></h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs" id="settings-email"></p>
</div>
</section>
<!-- Academic Credentials -->
<section>
<h3 class="font-h6 text-h6 text-on-surface-variant mb-md px-sm">Academic Credentials</h3>
<div class="bg-white border border-[#E2E8F0] rounded-xl overflow-hidden">
<div class="p-lg flex items-start justify-between border-b border-outline-variant">
<div class="flex items-center gap-md">
<div class="p-2 bg-surface-container-low rounded-lg">
<span class="material-symbols-outlined text-primary">account_balance</span>
</div>
<div>
<p class="font-label text-label text-on-surface-variant">University</p>
<p class="font-body-md text-body-md text-on-background font-medium" id="settings-college">—</p>
</div>
</div>
</div>
<div class="p-lg flex items-start justify-between border-b border-outline-variant">
<div class="flex items-center gap-md">
<div class="p-2 bg-surface-container-low rounded-lg">
<span class="material-symbols-outlined text-primary">biotech</span>
</div>
<div>
<p class="font-label text-label text-on-surface-variant">Department</p>
<p class="font-body-md text-body-md text-on-background font-medium" id="settings-department">—</p>
</div>
</div>
</div>
<div class="p-lg flex items-start justify-between">
<div class="flex items-center gap-md">
<div class="p-2 bg-surface-container-low rounded-lg">
<span class="material-symbols-outlined text-primary">calendar_today</span>
</div>
<div>
<p class="font-label text-label text-on-surface-variant">Year</p>
<p class="font-body-md text-body-md text-on-background font-medium" id="settings-year">—</p>
</div>
</div>
</div>
</div>
</section>
<!-- My Skills -->
<section>
<h3 class="font-h6 text-h6 text-on-surface-variant mb-md px-sm">My Skills</h3>
<div class="bg-white border border-outline-variant rounded-xl p-lg">
<div id="skills-list" class="space-y-sm mb-md">
<p class="font-body-sm text-on-surface-variant" id="skills-loading">Loading skills...</p>
</div>
<div class="flex gap-sm">
<div class="flex-1 relative">
<input class="w-full px-md py-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all bg-white outline-none text-body-sm" id="skill-name-input" placeholder="Search skills..." type="text" autocomplete="off"/>
<div class="hidden absolute left-0 right-0 top-full mt-1 bg-white border border-outline-variant rounded-lg shadow-lg max-h-48 overflow-y-auto z-10" id="skill-dropdown"></div>
</div>
<select class="px-md py-sm border border-outline-variant rounded-lg bg-white text-body-sm focus:ring-primary" id="skill-level-input">
<option value="1">Lvl 1</option>
<option value="2">Lvl 2</option>
<option value="3">Lvl 3</option>
<option value="4">Lvl 4</option>
<option value="5" selected>Lvl 5</option>
</select>
<button class="bg-primary text-on-primary px-md py-sm rounded-lg font-label text-label hover:bg-primary-container transition-colors flex items-center gap-xs" id="add-skill-btn">
<span class="material-symbols-outlined text-[18px]">add</span>
Add
</button>
</div>
</div>
</section>
<!-- Notification Settings -->
<section>
<h3 class="font-h6 text-h6 text-on-surface-variant mb-md px-sm">Notification Settings</h3>
<div class="bg-white border border-[#E2E8F0] rounded-xl divide-y divide-outline-variant">
<div class="p-lg flex items-center justify-between">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant">notifications_active</span>
<span class="font-body-md text-body-md text-on-background">Push Notifications</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer custom-toggle" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest rounded-full peer transition-colors duration-200"></div>
<div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform duration-200 toggle-dot"></div>
</label>
</div>
<div class="p-lg flex items-center justify-between">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant">mail</span>
<span class="font-body-md text-body-md text-on-background">Email Alerts</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer custom-toggle" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest rounded-full peer transition-colors duration-200"></div>
<div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform duration-200 toggle-dot"></div>
</label>
</div>
<div class="p-lg flex items-center justify-between">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant">join_full</span>
<span class="font-body-md text-body-md text-on-background">New Project Matches</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer custom-toggle" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest rounded-full peer transition-colors duration-200"></div>
<div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform duration-200 toggle-dot"></div>
</label>
</div>
</div>
</section>
<!-- Security & Privacy -->
<section>
<h3 class="font-h6 text-h6 text-on-surface-variant mb-md px-sm">Security &amp; Privacy</h3>
<div class="bg-white border border-[#E2E8F0] rounded-xl divide-y divide-outline-variant">
<button class="w-full p-lg flex items-center justify-between hover:bg-surface-container-low transition-colors duration-200">
<div class="flex items-center gap-md text-on-surface-variant">
<span class="material-symbols-outlined">lock</span>
<span class="font-body-md text-body-md text-on-background">Change Password</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<button class="w-full p-lg flex items-center justify-between hover:bg-surface-container-low transition-colors duration-200">
<div class="flex items-center gap-md text-on-surface-variant">
<span class="material-symbols-outlined">security</span>
<span class="font-body-md text-body-md text-on-background">Two-Factor Authentication</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<button class="w-full p-lg flex items-center justify-between hover:bg-surface-container-low transition-colors duration-200">
<div class="flex items-center gap-md text-on-surface-variant">
<span class="material-symbols-outlined">policy</span>
<span class="font-body-md text-body-md text-on-background">Privacy Policy</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
</div>
</section>
<!-- Support & About -->
<section>
<h3 class="font-h6 text-h6 text-on-surface-variant mb-md px-sm">Support &amp; About</h3>
<div class="bg-white border border-[#E2E8F0] rounded-xl divide-y divide-outline-variant">
<button class="w-full p-lg flex items-center justify-between hover:bg-surface-container-low transition-colors duration-200">
<div class="flex items-center gap-md text-on-surface-variant">
<span class="material-symbols-outlined">help</span>
<span class="font-body-md text-body-md text-on-background">Help Center</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<button class="w-full p-lg flex items-center justify-between hover:bg-surface-container-low transition-colors duration-200">
<div class="flex items-center gap-md text-on-surface-variant">
<span class="material-symbols-outlined">description</span>
<span class="font-body-md text-body-md text-on-background">Terms of Service</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<button id="logout-btn" class="w-full p-lg flex items-center justify-between hover:bg-red-50 transition-colors duration-200 group">
<div class="flex items-center gap-md text-error">
<span class="material-symbols-outlined">logout</span>
<span class="font-body-md text-body-md font-semibold">Log Out</span>
</div>
</button>
</div>
</section>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/components/sidebar.js"></script>
<script src="/assets/js/pages/settings.js"></script>
</body></html>
