<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Teams - CollabHub</title>
<link rel="stylesheet" href="/assets/css/styles.css"/>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-container-high fixed top-0 w-full z-50 flex justify-between items-center px-md py-sm border-b border-outline-variant dark:border-outline h-16">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" data-icon="school">school</span>
<h1 class="font-h5 text-h5 font-h5-mobile text-h5-mobile font-bold text-primary dark:text-inverse-primary">CollabHub</h1>
</div>
<div class="flex items-center gap-sm">
<button class="p-2 hover:bg-primary-container/10 transition-colors duration-200 rounded-full" onclick="window.location.href='notifications.html'">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<main class="pt-20 px-4 max-w-xl mx-auto">
<!-- Segmented Control -->
<div class="bg-surface-container-low p-1 rounded-xl flex items-center relative mb-lg">
<div class="tab-indicator absolute h-[calc(100%-8px)] w-[calc(50%-4px)] bg-white shadow-sm rounded-lg top-1 left-1 z-0" id="tab-pill"></div>
<button class="relative z-10 flex-1 py-2 font-label text-label text-primary text-center transition-colors" id="btn-active" onclick="toggleTab('active')">
                Active Teams
            </button>
<button class="relative z-10 flex-1 py-2 font-label text-label text-on-surface-variant text-center transition-colors" id="btn-pending" onclick="toggleTab('pending')">
                Applications
            </button>
</div>
<!-- Section: Active Teams -->
<div class="space-y-lg transition-opacity duration-300" id="active-content">
<p class="font-body-sm text-on-surface-variant" id="teams-loading">Loading teams...</p>
<!-- CTA for more teams -->
<div class="p-lg bg-primary-container/5 border-2 border-dashed border-primary-container/30 rounded-2xl text-center">
<div class="w-12 h-12 bg-primary-container/10 rounded-full flex items-center justify-center mx-auto mb-md">
<span class="material-symbols-outlined text-primary" data-icon="group_add">group_add</span>
</div>
<h4 class="font-h6 text-h6 mb-xs">Ready for more?</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-md">Explore new projects that match your verified skills and academic interests.</p>
<a href="feed.html" class="bg-primary text-on-primary px-md py-sm rounded-xl font-label text-label flex items-center gap-2 mx-auto active:scale-95 transition-transform inline-flex">
                    Find More Teams
                    <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</a>
</div>
</div>
<!-- Section: Pending Applications (Hidden by default) -->
<div class="hidden space-y-lg transition-opacity duration-300" id="pending-content">
<p class="font-body-sm text-on-surface-variant" id="pending-loading">Loading applications...</p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface dark:bg-inverse-surface rounded-t-xl shadow-md">
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 transition-transform duration-150" href="my_teams.html">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-label text-label">My Teams</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant p-2 hover:bg-surface-container-high dark:hover:bg-surface-container transition-transform duration-150" href="feed.html">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label text-label">Activities</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant p-2 hover:bg-surface-container-high dark:hover:bg-surface-container transition-transform duration-150" href="dashboard.html">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-label text-label">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant p-2 hover:bg-surface-container-high dark:hover:bg-surface-container transition-transform duration-150" href="feed.html">
<span class="material-symbols-outlined" data-icon="search">search</span>
<span class="font-label text-label">Discover</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant p-2 hover:bg-surface-container-high dark:hover:bg-surface-container transition-transform duration-150" href="settings.html">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label text-label">Settings</span>
</a>
</nav>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/components/sidebar.js"></script>
<script src="/assets/js/pages/my_teams.js"></script>
</body></html>
