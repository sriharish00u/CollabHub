<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CollabHub | Activity Details</title>
<link rel="stylesheet" href="/assets/css/styles.css"/>
<style>
        .skill-bar-bg {
            background: #E2E8F0;
            height: 6px;
            border-radius: 999px;
            overflow: hidden;
        }
        .skill-bar-fill {
            height: 100%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="font-body-md text-body-md overflow-x-hidden">
<main class="pt-8 pb-xxl px-gutter max-w-[1200px] mx-auto min-h-screen">
<!-- Hero Section -->
<section class="grid grid-cols-1 lg:grid-cols-12 gap-xl mb-xxl">
<div class="lg:col-span-8 flex flex-col justify-center">
<div class="flex items-center gap-sm mb-md">
<span class="bg-primary-container text-on-primary-container px-sm py-xs rounded-lg font-label text-label" id="activity-category"></span>
<span class="text-on-surface-variant flex items-center gap-xs font-caption text-caption">
<span class="material-symbols-outlined text-[16px]">schedule</span>
<span id="activity-deadline-label"></span>
</span>
</div>
<h1 class="font-h1 text-h1-mobile lg:text-h1 mb-md leading-tight text-on-surface" id="activity-title"></h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mb-xl" id="activity-description"></p>
<div class="flex flex-wrap items-center gap-lg">
<div class="flex items-center gap-sm" id="activity-creator-info">
<div class="w-12 h-12 rounded-full overflow-hidden bg-surface-container" id="creator-avatar-container">
<span class="material-symbols-outlined text-outline">person</span>
</div>
<div>
<p class="font-label text-label text-on-surface" id="creator-name"></p>
<p class="font-caption text-caption text-outline" id="creator-role"></p>
</div>
</div>
<div class="h-10 w-px bg-outline-variant hidden sm:block"></div>
<div class="flex flex-col">
<span class="font-caption text-caption text-outline">Deadline</span>
<span class="font-h6 text-h6 text-primary" id="countdown"></span>
</div>
</div>
</div>
<div class="lg:col-span-4 relative h-64 lg:h-auto rounded-xl overflow-hidden border border-outline-variant shadow-lg group">
<div class="absolute inset-0 bg-primary opacity-10 group-hover:opacity-20 transition-opacity z-10"></div>
<div class="absolute bottom-md left-md right-md z-20">
<button class="w-full bg-primary text-on-primary font-h6 text-h6 py-md rounded-lg shadow-xl hover:scale-[1.02] active:scale-95 transition-all" id="apply-btn-hero">Apply Now</button>
<button class="w-full bg-secondary text-on-secondary font-h6 text-h6 py-md rounded-lg shadow-xl hover:scale-[1.02] active:scale-95 transition-all hidden" id="review-btn-hero">Review Applicants</button>
<button class="w-full bg-tertiary text-on-tertiary font-h6 text-h6 py-md rounded-lg shadow-xl hover:scale-[1.02] active:scale-95 transition-all hidden" id="chat-btn-hero">Group Chat</button>
</div>
</div>
</section>
<!-- Main Content Grid -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-xl items-start">
<!-- Left Side: Description & Tech Stack -->
<div class="lg:col-span-2 space-y-xl">
<!-- Eligibility Banner -->
<div class="hidden bg-amber-50 border border-amber-200 p-lg rounded-xl items-start gap-md" id="eligibility-banner">
<span class="material-symbols-outlined text-amber-600">warning</span>
<div>
<h4 class="font-h6 text-h6 text-amber-900">Skill Gap Detected</h4>
<p class="font-body-sm text-body-sm text-amber-800" id="eligibility-msg"></p>
<button class="mt-sm text-amber-900 underline font-label text-label decoration-amber-400" onclick="window.location.href='settings.html'">Manage Your Skills</button>
</div>
</div>
<!-- Description Card -->
<div class="bg-surface-container-lowest border border-outline-variant p-lg rounded-xl">
<h3 class="font-h4 text-h4 mb-md text-on-surface">Project Mission</h3>
<p class="text-on-surface-variant mb-lg leading-relaxed" id="activity-full-description"></p>
<h4 class="font-h6 text-h6 mb-sm text-on-surface">Tech Stack</h4>
<div class="flex flex-wrap gap-sm" id="tech-stack"></div>
</div>
<!-- Team Progress -->
<div class="bg-surface-container-lowest border border-outline-variant p-lg rounded-xl">
<div class="flex justify-between items-end mb-md">
<h3 class="font-h4 text-h4 text-on-surface">Team Status</h3>
<span class="font-h6 text-h6 text-primary" id="team-count"></span>
</div>
<div class="w-full bg-outline-variant h-4 rounded-full overflow-hidden mb-lg">
<div class="bg-primary h-full transition-all duration-1000 ease-out" id="team-progress-bar"></div>
</div>
<div class="grid grid-cols-2 sm:grid-cols-5 gap-md" id="team-members-grid"></div>
</div>
</div>
<!-- Right Side: Skills Comparison & CTA -->
<aside class="space-y-xl sticky top-24">
<!-- Match Score Badge Card -->
<div class="bg-surface-container-lowest border border-outline-variant p-lg rounded-xl text-center">
<h4 class="font-h6 text-h6 text-on-surface-variant mb-lg">Your Match Score</h4>
<div class="relative w-32 h-32 mx-auto mb-md">
<svg class="w-full h-full" viewBox="0 0 100 100">
<circle class="text-surface-container-high stroke-current" cx="50" cy="50" fill="transparent" r="40" stroke-width="8"></circle>
<circle class="text-secondary stroke-current" cx="50" cy="50" fill="transparent" r="40" stroke-dasharray="251.2" stroke-linecap="round" stroke-width="8" transform="rotate(-90 50 50)" id="match-ring"></circle>
</svg>
<div class="absolute inset-0 flex items-center justify-center">
<span class="font-h3 text-h3 text-on-surface" id="match-score">--</span>
</div>
</div>
<p class="font-caption text-caption text-outline mb-xl">Based on your verified skills</p>
<button class="w-full bg-secondary text-on-secondary font-h6 text-h6 py-md rounded-lg shadow-lg hover:brightness-110 active:scale-95 transition-all uppercase tracking-wide" onclick="window.location.href='settings.html'">Boost Eligibility</button>
</div>
<!-- Skills Comparison -->
<div class="bg-surface-container-lowest border border-outline-variant p-lg rounded-xl">
<h3 class="font-h6 text-h6 mb-lg text-on-surface">Skills Comparison</h3>
<div class="space-y-lg" id="skills-comparison"></div>
</div>
<!-- Shared CTA Secondary -->
<div class="bg-primary-container p-xl rounded-xl text-center text-on-primary">
<p class="font-h5 text-h5 mb-md">Ready to collaborate?</p>
<button class="w-full bg-surface text-primary font-h6 text-h6 py-md rounded-lg shadow-sm hover:bg-surface-bright transition-colors active:scale-95" id="apply-btn-cta">Send Application</button>
<p class="mt-sm font-caption text-caption text-on-primary-container opacity-80" id="apply-deadline-text"></p>
</div>
</aside>
</div>
</main>
<!-- Status feedback toast -->
<div id="toast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-50 px-lg py-md rounded-lg shadow-lg font-label text-label text-on-primary transition-all duration-300"></div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/components/sidebar.js"></script>
<script src="/assets/js/pages/activity_detail.js"></script>
</body></html>
