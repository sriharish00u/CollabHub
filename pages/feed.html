<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CollabHub | Activity Feed</title>
<link rel="stylesheet" href="/assets/css/styles.css"/>
</head>
<body class="font-body-md text-on-surface">
<main class="pt-8 pb-xxl px-gutter max-w-[1200px] mx-auto">
<!-- Header & Filters -->
<section class="mb-xl">
<div class="flex flex-col md:flex-row md:items-end justify-between gap-lg mb-lg">
<div>
<h1 class="font-h2 text-h2 text-on-surface mb-xs">Activity Feed</h1>
<p class="text-on-surface-variant font-body-md">Discover top-tier collaborations curated for your verified skillset.</p>
</div>
<div class="flex items-center gap-sm">
<span class="text-label font-label text-on-surface-variant">Sort by:</span>
<select id="sort-select" class="bg-surface border-outline-variant text-body-sm font-label rounded-lg px-md py-xs focus:ring-primary focus:border-primary">
<option value="best_match">Best Match for Me</option>
<option value="recent">Most Recent</option>
<option value="closing_soon">Closing Soon</option>
</select>
</div>
</div>
<!-- Filter Bar Bento -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-md p-md bg-surface-container rounded-xl border border-outline-variant">
<div class="md:col-span-3 flex flex-col gap-xs">
<label class="text-label font-label text-on-surface-variant">Category</label>
<div class="relative">
<select id="filter-category" class="w-full bg-white border-outline-variant rounded-lg px-md py-sm text-body-sm focus:ring-primary appearance-none">
<option value="">All Categories</option>
<option value="hackathon">Hackathon</option>
<option value="project">Project</option>
<option value="research">Research</option>
<option value="open_source">Open Source</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<div class="md:col-span-7 flex flex-col gap-xs">
<label class="text-label font-label text-on-surface-variant">Skill Search</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-2.5 text-on-surface-variant text-[20px]">search</span>
<input id="filter-skill" class="w-full bg-white border-outline-variant rounded-lg pl-10 pr-md py-sm text-body-sm focus:ring-primary" placeholder="Search by required skills (e.g. Python, UX Design)..." type="text"/>
</div>
</div>
<div class="md:col-span-2 flex items-end">
<button id="apply-filters-btn" class="w-full bg-primary text-white font-label text-label py-[11px] rounded-lg hover:bg-primary-container transition-all flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[18px]">tune</span>
                        Apply Filters
                    </button>
</div>
</div>
</section>
<!-- Eligibility Banner -->
<div id="eligibility-banner" class="mb-xl p-md bg-[#ECFDF5] border border-[#10B981] rounded-lg flex items-center justify-between gap-md hidden">
<div class="flex items-center gap-md">
<div class="bg-[#10B981] text-white p-sm rounded-full flex">
<span class="material-symbols-outlined text-[20px]">verified</span>
</div>
<div>
<h4 class="font-h6 text-h6 text-[#065F46]">High Eligibility Detected</h4>
<p class="font-body-sm text-[#065F46] opacity-90" id="eligibility-text"></p>
</div>
</div>
</div>
<!-- Activity Grid -->
<div id="activity-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-lg">
</div>
<!-- Pagination -->
<div id="pagination" class="mt-xxl flex justify-center items-center gap-md hidden">
</div>
</main>
<!-- FAB -->
<button class="fixed bottom-lg right-lg w-14 h-14 bg-secondary text-white rounded-full shadow-lg flex items-center justify-center hover:scale-105 active:scale-95 transition-transform z-40">
<span class="material-symbols-outlined text-[28px]">add</span>
</button>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/components/sidebar.js"></script>
<script src="/assets/js/pages/feed.js"></script>
</body></html>
