<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>User Profile | CollabHub</title>
<link rel="stylesheet" href="/assets/css/styles.css"/>
</head>
<body class="bg-background text-on-surface font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed overflow-x-hidden">
<main class="pt-8 min-h-screen">
<!-- Header Hero Section -->
<section class="bg-surface-container-low border-b border-outline-variant py-xxl">
<div class="max-w-[1200px] mx-auto px-gutter">
<div class="flex flex-col md:flex-row items-center md:items-start gap-xl">
<!-- Avatar & Completion -->
<div class="relative flex-shrink-0">
<div class="w-40 h-40 rounded-full overflow-hidden border-4 border-white shadow-lg">
<img class="w-full h-full object-cover" id="profile-avatar" src="" alt="Profile"/>
</div>
<div class="absolute -bottom-2 -right-2 bg-white rounded-full p-1 shadow-md">
<svg class="w-16 h-16 transform -rotate-90">
<circle class="skill-ring-bg" cx="32" cy="32" fill="transparent" r="28" stroke-width="4"></circle>
<circle class="skill-ring-active" cx="32" cy="32" fill="transparent" r="28" stroke-linecap="round" stroke-width="4"></circle>
<text class="font-h5 text-h5 fill-on-surface-variant" dominant-baseline="middle" id="skill-pct" style="font-size: 14px;" text-anchor="middle" transform="rotate(90)" x="32" y="-32"></text>
</svg>
</div>
</div>
<!-- User Info -->
<div class="flex-grow text-center md:text-left">
<div class="flex flex-col md:flex-row md:items-center justify-between gap-md mb-sm">
<div>
<h1 class="font-h2 text-h2 text-on-surface" id="profile-name"></h1>
<p class="font-h6 text-h6 text-primary flex items-center justify-center md:justify-start gap-xs">
<span class="material-symbols-outlined" style="font-size: 18px;">school</span>
<span id="profile-dept-college"></span>
</p>
</div>
<div class="flex gap-sm justify-center">
<a href="settings.html" class="px-lg py-sm border border-primary text-primary font-label text-label rounded-lg hover:bg-primary-fixed transition-all inline-flex items-center">
<span class="material-symbols-outlined text-[18px] mr-1">settings</span>
                                    Settings
                                </a>
</div>
</div>
<p class="max-w-2xl font-body-md text-on-surface-variant leading-relaxed" id="profile-bio">
                        </p>
</div>
</div>
</div>
</section>
<!-- Main Layout -->
<div class="max-w-[1200px] mx-auto px-gutter py-xl flex flex-col lg:flex-row gap-xl">
<!-- Sidebar -->
<aside class="w-full lg:w-80 flex flex-col gap-lg">
<!-- Stats Card -->
<div class="glass-card rounded-xl p-lg shadow-sm">
<h3 class="font-h6 text-h6 mb-lg border-b border-outline-variant pb-sm">Profile Stats</h3>
<div class="space-y-md">
<div class="flex justify-between items-center p-md bg-surface-container rounded-lg">
<div class="flex flex-col">
<span class="font-label text-label text-on-surface-variant">Skills</span>
<span class="font-h4 text-h4 text-secondary" id="stat-skills">0</span>
</div>
<span class="material-symbols-outlined text-secondary">verified</span>
</div>
<div class="flex justify-between items-center p-md bg-surface-container rounded-lg">
<div class="flex flex-col">
<span class="font-label text-label text-on-surface-variant">Email</span>
<span class="font-body-sm text-body-sm text-primary truncate max-w-[160px]" id="stat-email"></span>
</div>
<span class="material-symbols-outlined text-primary">mail</span>
</div>
<div class="flex justify-between items-center p-md bg-surface-container rounded-lg">
<div class="flex flex-col">
<span class="font-label text-label text-on-surface-variant">Year</span>
<span class="font-body-sm text-body-sm text-primary" id="stat-year"></span>
</div>
<span class="material-symbols-outlined text-primary">calendar_today</span>
</div>
</div>
</div>
</aside>
<!-- Primary Column -->
<div class="flex-grow flex flex-col gap-xl">
<!-- Verified Skills -->
<section class="glass-card rounded-xl p-lg shadow-sm">
<div class="flex justify-between items-center mb-lg">
<h2 class="font-h4 text-h4">Verified Skills</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md" id="skills-grid">
<p class="font-body-sm text-on-surface-variant col-span-full" id="skills-loading">Loading skills...</p>
</div>
</section>
<!-- Project Portfolio Tabs -->
<section class="flex-grow">
<div class="flex border-b border-outline-variant mb-lg">
<button class="px-xl py-md border-b-2 border-primary text-primary font-h6 text-h6 transition-all" id="tab-created" onclick="switchTab('created')">Created Activities</button>
<button class="px-xl py-md border-b-2 border-transparent text-on-surface-variant font-h6 text-h6 hover:text-primary transition-all" id="tab-joined" onclick="switchTab('joined')">Joined Teams</button>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md" id="content-created">
<p class="font-body-sm text-on-surface-variant" id="created-loading">Loading activities...</p>
</div>
<div class="hidden" id="content-joined">
<p class="font-body-sm text-on-surface-variant" id="joined-loading">Loading joined teams...</p>
</div>
</section>
</div>
</div>
</main>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/components/sidebar.js"></script>
<script src="/assets/js/pages/profile.js"></script>
</body></html>
