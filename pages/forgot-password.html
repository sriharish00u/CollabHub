<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Password | CollabHub</title>
<link rel="stylesheet" href="/assets/css/styles.css"/>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex items-center justify-center p-lg">
<div class="w-full max-w-md">
<div class="bg-surface border border-outline-variant rounded-xl p-xl">
<!-- Step 1: Verify Identity -->
<div id="verify-stage">
<div class="text-center mb-xl">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center mx-auto mb-lg">
<span class="material-symbols-outlined text-on-primary-container text-[32px]">lock_reset</span>
</div>
<h2 class="font-h2 text-h2 mb-xs">Reset your password</h2>
<p class="font-body-md text-on-surface-variant">Enter your email and answer your security question.</p>
</div>
<form class="space-y-lg" id="verify-form">
<div class="space-y-xs">
<label class="font-label text-label text-on-surface-variant ml-xs" for="fp-email">Email</label>
<input class="w-full h-12 px-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md transition-all" id="fp-email" placeholder="you@organization.com" type="email" required/>
</div>
<div class="space-y-xs">
<label class="font-label text-label text-on-surface-variant ml-xs" for="fp-answer">Security Answer</label>
<input class="w-full h-12 px-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md transition-all" id="fp-answer" placeholder="Your answer" type="text" required/>
</div>
<div id="verify-error" class="hidden text-body-sm text-error"></div>
<button class="w-full h-14 bg-primary text-white font-h6 text-h6 rounded-lg hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-lg" type="submit" id="verify-btn">
                    Verify
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
</div>

<!-- Step 2: New Password (hidden) -->
<div id="reset-stage" class="hidden">
<div class="text-center mb-xl">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center mx-auto mb-lg">
<span class="material-symbols-outlined text-on-primary-container text-[32px]">lock</span>
</div>
<h2 class="font-h2 text-h2 mb-xs">Set new password</h2>
<p class="font-body-md text-on-surface-variant">Enter your new password below.</p>
</div>
<form class="space-y-lg" id="reset-form">
<div class="space-y-xs">
<label class="font-label text-label text-on-surface-variant ml-xs" for="fp-new">New Password</label>
<input class="w-full h-12 px-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md transition-all" id="fp-new" placeholder="Min. 8 characters" type="password" required minlength="8"/>
</div>
<div class="space-y-xs">
<label class="font-label text-label text-on-surface-variant ml-xs" for="fp-confirm">Confirm Password</label>
<input class="w-full h-12 px-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md transition-all" id="fp-confirm" placeholder="Re-enter password" type="password" required minlength="8"/>
</div>
<div id="reset-error" class="hidden text-body-sm text-error"></div>
<button class="w-full h-14 bg-primary text-white font-h6 text-h6 rounded-lg hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-lg" type="submit" id="reset-btn">
                    Reset Password
                    <span class="material-symbols-outlined">check</span>
</button>
</form>
</div>

<!-- Success State (hidden) -->
<div id="success-state" class="hidden text-center py-xl">
<span class="material-symbols-outlined text-primary text-[64px] mb-lg">check_circle</span>
<h2 class="font-h2 text-h2 mb-md">Password reset!</h2>
<p class="font-body-md text-on-surface-variant mb-xl">Your password has been updated.</p>
<a href="login.html" class="inline-flex items-center gap-sm bg-primary text-on-primary px-xl py-md rounded-lg font-label text-label hover:bg-primary/90 active:scale-95 transition-all">
                Sign in
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</a>
</div>
</div>
<div class="mt-lg text-center">
<a href="login.html" class="font-body-sm text-primary hover:underline">Back to sign in</a>
</div>
</div>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/pages/forgot_password.js"></script>
</body></html>
