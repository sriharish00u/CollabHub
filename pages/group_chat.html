<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CollabHub | AI Medical Assistant Dashboard</title>
<link rel="stylesheet" href="/assets/css/styles.css"/>
</head>
<body class="bg-surface text-on-surface overflow-hidden h-screen flex">
<!-- Main Content Canvas -->
<main class="flex-1 flex h-screen overflow-hidden">
<!-- Left Sidebar: Chat List -->
<section class="w-80 bg-surface-container-low border-r border-outline-variant flex flex-col h-full">
<div class="p-lg border-b border-outline-variant flex items-center justify-between">
<h2 class="font-h5 text-h5 font-bold">Chats</h2>
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary">filter_list</span>
</div>
<div class="flex-1 overflow-y-auto chat-scrollbar" id="chat-list">
<!-- Populated by JS -->
</div>
</section>
<!-- Center Panel: Chat Thread -->
<section class="flex-1 flex flex-col bg-surface-container-lowest h-full">
<!-- Chat Header -->
<header class="h-16 px-lg border-b border-outline-variant flex items-center justify-between">
<div class="flex items-center gap-md">
<div>
<h2 class="font-h5 text-h5 font-bold flex items-center gap-sm" id="chat-title">
                            Activity
                            <span class="inline-block w-2 h-2 bg-green-500 rounded-full"></span>
</h2>
<p class="font-caption text-caption text-on-surface-variant" id="chat-subtitle">Loading...</p>
</div>
</div>
<div class="flex items-center gap-lg">
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">search</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<!-- Message Thread -->
<div class="flex-1 overflow-y-auto p-lg space-y-xl chat-scrollbar" id="message-thread">
<!-- Populated by JS -->
</div>
<!-- Chat Footer: Rich Text Input -->
<footer class="p-lg bg-surface-container-low border-t border-outline-variant">
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-sm shadow-sm focus-within:ring-2 focus-within:ring-primary transition-all">
<textarea class="w-full bg-transparent border-none focus:ring-0 font-body-md text-body-md resize-none p-sm" id="message-input" placeholder="Type a message to the team..." rows="2"></textarea>
<div class="flex items-center justify-between border-t border-outline-variant pt-sm mt-sm">
<div class="flex gap-sm">
<button class="p-xs hover:bg-surface-container rounded text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">attach_file</span>
</button>
<button class="p-xs hover:bg-surface-container rounded text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">mood</span>
</button>
<button class="p-xs hover:bg-surface-container rounded text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">format_bold</span>
</button>
</div>
<button class="bg-primary text-on-primary px-lg py-sm rounded flex items-center gap-sm font-label text-label hover:opacity-90 active:scale-95 transition-all" id="send-btn">
                            Send
                            <span class="material-symbols-outlined text-[18px]">send</span>
</button>
</div>
</div>
</footer>
</section>
<!-- Right Sidebar: Team Members -->
<section class="w-72 border-l border-outline-variant bg-surface flex flex-col p-lg">
<h2 class="font-h6 text-h6 font-bold mb-lg border-b border-outline-variant pb-sm">Team Roster</h2>
<div class="space-y-lg flex-1" id="members-list">
<!-- Populated by JS -->
</div>
<div class="mt-auto space-y-sm">
<button class="w-full flex items-center justify-center gap-sm border border-primary text-primary py-md rounded font-label text-label hover:bg-surface-container transition-all active:scale-95">
<span class="material-symbols-outlined">calendar_today</span>
                    Schedule Meeting
                </button>
<button class="w-full flex items-center justify-center gap-sm bg-surface-container-high text-on-surface-variant py-md rounded font-label text-label hover:bg-surface-container-highest transition-all active:scale-95">
<span class="material-symbols-outlined">folder_open</span>
                    View Project Docs
                </button>
<button class="w-full flex items-center justify-center gap-sm bg-secondary text-on-secondary py-md rounded font-label text-label shadow-lg hover:opacity-90 active:scale-95 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
                    Match Teammate
                </button>
</div>
</section>
</main>
<script src="/assets/js/config.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/components/sidebar.js"></script>
<script src="/assets/js/pages/group_chat.js"></script>
</body></html>
